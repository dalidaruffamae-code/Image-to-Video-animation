<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to Moving Video Generator</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: #0f172a;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }

    .control-box {
      background: #1e293b;
      padding: 15px;
      border-radius: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="file"],
    select,
    input[type="range"] {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #334155;
      color: white;
    }

    input[type="range"] {
      padding: 0;
    }

    .duration-text {
      margin-top: 8px;
      color: #38bdf8;
      font-weight: bold;
    }

    .canvas-wrapper {
      background: #020617;
      padding: 15px;
      border-radius: 18px;
      text-align: center;
      margin-bottom: 20px;
    }

    canvas {
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 14px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .generate-btn {
      background: #22c55e;
      color: #052e16;
    }

    .download-btn {
      background: #38bdf8;
      color: #082f49;
      display: none;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 12px;
      font-weight: bold;
    }

    .reset-btn {
      background: #ef4444;
      color: white;
    }

    video {
      display: none;
      width: 100%;
      max-width: 720px;
      margin-top: 20px;
      border-radius: 14px;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      color: #cbd5e1;
    }

    @media (max-width: 700px) {
      .controls {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Image to Moving Video Generator</h1>
    <p class="subtitle">Upload an image, choose animation, set duration, then download the video.</p>

    <div class="controls">
      <div class="control-box">
        <label>Upload Image</label>
        <input type="file" id="imageInput" accept="image/*" />
      </div>

      <div class="control-box">
        <label>Animation Type</label>
        <select id="effectSelect">
          <option value="move">Moving Image</option>
          <option value="side">Camera Side Movement</option>
          <option value="zoomIn">Zoom In</option>
          <option value="zoomOut">Zoom Out</option>
          <option value="wave">Wave Effect</option>
        </select>
      </div>

      <div class="control-box">
        <label>Video Duration</label>
        <input type="range" id="durationRange" min="1" max="10" value="3" />
        <div class="duration-text">
          Duration: <span id="durationValue">3</span> seconds
        </div>
      </div>

      <div class="control-box">
        <label>Video Quality</label>
        <select id="qualitySelect">
          <option value="720">720p HD</option>
          <option value="1080">1080p Full HD</option>
        </select>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="canvas" width="1280" height="720"></canvas>
      <video id="previewVideo" controls></video>
    </div>

    <div class="buttons">
      <button class="generate-btn" id="generateBtn">Generate Video</button>
      <a class="download-btn" id="downloadBtn" download="moving-image-video.webm">Download Video</a>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>

    <div class="status" id="statusText">Upload an image to begin.</div>
  </div>

  <script>
    const imageInput = document.getElementById("imageInput");
    const effectSelect = document.getElementById("effectSelect");
    const durationRange = document.getElementById("durationRange");
    const durationValue = document.getElementById("durationValue");
    const qualitySelect = document.getElementById("qualitySelect");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const previewVideo = document.getElementById("previewVideo");
    const statusText = document.getElementById("statusText");

    let uploadedImage = null;
    let recordedChunks = [];

    durationRange.addEventListener("input", () => {
      durationValue.textContent = durationRange.value;
    });

    imageInput.addEventListener("change", (event) => {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        uploadedImage = new Image();

        uploadedImage.onload = function() {
          drawImageCover(uploadedImage, 0, 0, canvas.width, canvas.height);
          statusText.textContent = "Image uploaded. Choose effect and generate video.";
        };

        uploadedImage.src = e.target.result;
      };

      reader.readAsDataURL(file);
    });

    qualitySelect.addEventListener("change", () => {
      const quality = qualitySelect.value;

      if (quality === "720") {
        canvas.width = 1280;
        canvas.height = 720;
      } else {
        canvas.width = 1920;
        canvas.height = 1080;
      }

      if (uploadedImage) {
        drawImageCover(uploadedImage, 0, 0, canvas.width, canvas.height);
      }
    });

    function drawImageCover(img, offsetX, offsetY, targetWidth, targetHeight, scale = 1, rotation = 0) {
      ctx.save();

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const canvasRatio = targetWidth / targetHeight;
      const imgRatio = img.width / img.height;

      let drawWidth, drawHeight;

      if (imgRatio > canvasRatio) {
        drawHeight = targetHeight * scale;
        drawWidth = drawHeight * imgRatio;
      } else {
        drawWidth = targetWidth * scale;
        drawHeight = drawWidth / imgRatio;
      }

      const x = targetWidth / 2 + offsetX;
      const y = targetHeight / 2 + offsetY;

      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);

      ctx.restore();
    }

    function drawFrame(progress, effect) {
      let offsetX = 0;
      let offsetY = 0;
      let scale = 1;
      let rotation = 0;

      if (effect === "move") {
        offsetX = Math.sin(progress * Math.PI * 2) * 45;
        offsetY = Math.cos(progress * Math.PI * 2) * 25;
        scale = 1.08;
      }

      if (effect === "side") {
        offsetX = -80 + progress * 160;
        scale = 1.12;
      }

      if (effect === "zoomIn") {
        scale = 1 + progress * 0.25;
      }

      if (effect === "zoomOut") {
        scale = 1.25 - progress * 0.25;
      }

      if (effect === "wave") {
        rotation = Math.sin(progress * Math.PI * 8) * 0.035;
        offsetX = Math.sin(progress * Math.PI * 6) * 20;
        scale = 1.08;
      }

      drawImageCover(uploadedImage, offsetX, offsetY, canvas.width, canvas.height, scale, rotation);
    }

    generateBtn.addEventListener("click", async () => {
      if (!uploadedImage) {
        alert("Please upload an image first.");
        return;
      }

      recordedChunks = [];
      downloadBtn.style.display = "none";
      previewVideo.style.display = "none";
      statusText.textContent = "Generating video...";

      const duration = parseInt(durationRange.value);
      const effect = effectSelect.value;
      const fps = 30;
      const totalFrames = duration * fps;

      const stream = canvas.captureStream(fps);

      let options = {
        mimeType: "video/webm; codecs=vp9"
      };

      if (!MediaRecorder.isTypeSupported(options.mimeType)) {
        options = {
          mimeType: "video/webm"
        };
      }

      const mediaRecorder = new MediaRecorder(stream, options);

      mediaRecorder.ondataavailable = function(event) {
        if (event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = function() {
        const blob = new Blob(recordedChunks, { type: "video/webm" });
        const videoURL = URL.createObjectURL(blob);

        previewVideo.src = videoURL;
        previewVideo.style.display = "block";

        downloadBtn.href = videoURL;
        downloadBtn.style.display = "inline-block";

        statusText.textContent = "Video ready. You can preview and download it.";
      };

      mediaRecorder.start();

      for (let frame = 0; frame < totalFrames; frame++) {
        const progress = frame / totalFrames;
        drawFrame(progress, effect);
        await wait(1000 / fps);
      }

      mediaRecorder.stop();
    });

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    resetBtn.addEventListener("click", () => {
      uploadedImage = null;
      imageInput.value = "";
      previewVideo.src = "";
      previewVideo.style.display = "none";
      downloadBtn.style.display = "none";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      statusText.textContent = "Upload an image to begin.";
    });

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
